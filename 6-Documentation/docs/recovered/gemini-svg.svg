       <text y="40" class="data-label">Logical Capacity:</text> <text x="350" y="40" class="data-value">21.3 Billion Bits</text>
       <text y="80" class="data-label">Sync Revision:</text> <text x="350" y="80" class="data-value">3.0.4-STATIC-ANATOMY</text>
