      <circle cx="-110.8" cy="-45.9" r="6" fill="#33d6ff"/> <text x="-135" y="-55" class="data-dim" text-anchor="end">S10</text>
      <circle cx="-84.8" cy="-84.8" r="6" fill="#33d6ff"/> <text x="-105" y="-105" class="data-dim" text-anchor="end">S11</text>
      <circle cx="-45.9" cy="-110.8" r="6" fill="#33d6ff"/> <text x="-55" y="-135" class="data-dim" text-anchor="end">S12</text>
      <circle cx="0" cy="-120" r="6" fill="#33d6ff"/> <text x="0" y="-145" class="data-dim" text-anchor="middle">S13</text>
      <circle cx="45.9" cy="-110.8" r="6" fill="#33d6ff"/> <text x="55" y="-135" class="data-dim">S14</text>
      <circle cx="84.8" cy="-84.8" r="6" fill="#33d6ff"/> <text x="105" y="-105" class="data-dim">S15</text>
      <circle cx="110.8" cy="-45.9" r="6" fill="#33d6ff"/> <text x="135" y="-55" class="data-dim">S16</text>
      
