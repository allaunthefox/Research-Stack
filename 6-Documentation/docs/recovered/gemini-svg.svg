        <text y="30">● Lineage Memory Accuracy</text>
        <text y="60">● Non-Domination Constraint</text>
        <text y="90">● Reversible Contact Protocol</text>
        <text y="120">● Truthful Origin Record</text>
        <text y="150">● Safe Self-Replication</text>
