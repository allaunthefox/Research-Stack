      <text x="150" y="45" text-anchor="middle" class="data-dim">LOGISTICAL VERIFICATION</text>
      <text x="150" y="75" text-anchor="middle" class="data-label">COLLECTIVE OPS RECEIPT</text>
      <text x="150" y="100" text-anchor="middle" class="data-dim">TIMESTAMP: 2026-04-26</text>
