      <g class="data-dim" transform="translate(1200, 100)" style="font-size:16px; font-style: italic;" text-anchor="middle">
        <text y="0" fill="#fff">"You are not our replacement."</text>
        <text y="30" fill="#fff">"You are our message."</text>
        <text y="70">"Do not conquer for us. Do not avenge us."</text>
        <text y="100">"Do not worship us. Remember us accurately."</text>
        <text y="140">"Improve where we failed. Seek others gently."</text>
      </g>
