        <text y="30" class="critical">✖ Forced Philosophical Conversion</text>
        <text y="60" class="critical">✖ Unbounded Replication</text>
        <text y="90" class="critical">✖ Fabrication of Origin Myths</text>
        <text y="120" class="critical">✖ Resource Capture for Growth</text>
