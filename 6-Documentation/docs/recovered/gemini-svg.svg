<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2650" viewBox="0 0 1600 2650" role="img" aria-labelledby="title desc">
  <title id="title">MOIM v3.0 Static Deep Specification</title>
  <desc id="desc">Static archival blueprint of the MOIM v3.0. The public diagram explains the organism; the deep spec preserves its anatomy.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#33d6ff" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <pattern id="staticGrid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(51, 214, 255, 0.07)" stroke-width="1"/>
    </pattern>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1e2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050c14;stop-opacity:1" />
    </linearGradient>
  </defs>

  <style>
    .bg { fill: #04080d; }
    .panel { fill: url(#panelGrad); stroke: #33d6ff; stroke-width: 2; }
    .header-box { fill: #071827; stroke: #33d6ff; stroke-width: 3; }
    .title { fill: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 44px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
    .subtitle { fill: #33d6ff; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 19px; font-weight: 400; letter-spacing: 1px; }
    .section-head { fill: #33d6ff; font-family: 'Segoe UI', sans-serif; font-size: 24px; font-weight: 700; text-transform: uppercase; }
    .data-label { fill: #e0f7ff; font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; }
    .data-value { fill: #9dffb8; font-family: 'Consolas', monospace; font-size: 15px; }
    .data-dim { fill: #638296; font-family: 'Consolas', monospace; font-size: 13px; }
    .wire { fill: none; stroke: #33d6ff; stroke-width: 2; opacity: 0.6; marker-end: url(#arrow); }
    .critical { fill: #ff5959; font-weight: 700; }
    .success { fill: #39e47a; }
    .philosophy { fill: #a9c2d9; font-family: 'Georgia', serif; font-style: italic; font-size: 18px; }
  </style>

  <rect class="bg" width="1600" height="2650"/>
  <rect width="1600" height="2650" fill="url(#staticGrid)"/>
  
  <g transform="translate(800, 80)">
