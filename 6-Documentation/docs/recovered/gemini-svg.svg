      <g transform="translate(300,0)"><rect width="250" height="100" rx="8" fill="#071827" stroke="#33d6ff"/><text x="125" y="45" text-anchor="middle" class="data-label">Nanokernel Core</text><text x="125" y="75" text-anchor="middle" class="data-dim">LUTs: 810</text></g>
      <g transform="translate(600,0)"><rect width="250" height="100" rx="8" fill="#071827" stroke="#33d6ff"/><text x="125" y="45" text-anchor="middle" class="data-label">Morphic FSM Eng</text><text x="125" y="75" text-anchor="middle" class="data-dim">LUTs: 290</text></g>
      <g transform="translate(900,0)"><rect width="250" height="100" rx="8" fill="#071827" stroke="#33d6ff"/><text x="125" y="45" text-anchor="middle" class="data-label">Origin Prot VM</text><text x="125" y="75" text-anchor="middle" class="data-dim">LUTs: 610</text></g>
      <g transform="translate(1200,0)"><rect width="240" height="100" rx="8" fill="#071827" stroke="#33d6ff"/><text x="120" y="45" text-anchor="middle" class="data-label">Safety Valves</text><text x="120" y="75" text-anchor="middle" class="data-dim">LUTs: 320</text></g>
      <path class="wire" d="M250 50 H300"/><path class="wire" d="M550 50 H600"/><path class="wire" d="M850 50 H900"/><path class="wire" d="M1150 50 H1200"/>
      <rect y="180" width="1440" height="240" fill="rgba(51, 214, 255, 0.02)" stroke="rgba(51, 214, 255, 0.1)"/>
      <text x="720" y="215" text-anchor="middle" class="data-label">GCL Bytecode Lowering &amp; Phase-Stable Multiplexing</text>
      <path d="M120 340 Q 420 260, 720 340 T 1320 340" fill="none" stroke="#b772ff" stroke-width="3" opacity="0.5"/>
