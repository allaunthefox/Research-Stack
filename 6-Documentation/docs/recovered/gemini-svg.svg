      <g transform="translate(0,35)"><text x="-150" y="15" class="data-label">Math</text><rect width="420" height="18" fill="#33d6ff"/><text x="280" y="15" class="data-value">66/100</text></g>
      <g transform="translate(0,70)"><text x="-150" y="15" class="data-label">Chemistry</text><rect width="320" height="18" fill="#49e9d1"/><text x="180" y="15" class="data-value">50/100</text></g>
      <g transform="translate(0,105)"><text x="-150" y="15" class="data-label">Computer Sci</text><rect width="100" height="18" fill="#ffd84a"/><text x="110" y="15" class="data-value">15/100</text></g>
      <g transform="translate(0,140)"><text x="-150" y="15" class="data-label">Engineering</text><rect width="80" height="18" fill="#ff9a3c"/><text x="90" y="15" class="data-value">12/100</text></g>
      <g transform="translate(0,175)"><text x="-150" y="15" class="data-label">Biology</text><rect width="60" height="18" fill="#ff6cb3"/><text x="70" y="15" class="data-value">10/100</text></g>
      <g transform="translate(0,210)"><text x="-150" y="15" class="data-label">Cosmology</text><rect width="80" height="18" fill="#b772ff"/><text x="90" y="15" class="data-value">12/100</text></g>
      <g transform="translate(0,245)"><text x="-150" y="15" class="data-label">Social Sci</text><rect width="90" height="18" fill="#ff5959"/><text x="100" y="15" class="data-value">13/100</text></g>
      <g transform="translate(0,280)"><text x="-150" y="15" class="data-label">Material Sci</text><rect width="100" height="18" fill="#33d6ff"/><text x="110" y="15" class="data-value">15/100</text></g>
      <g transform="translate(0,315)"><text x="-150" y="15" class="data-label">Medicine</text><rect width="80" height="18" fill="#49e9d1"/><text x="90" y="15" class="data-value">12/100</text></g>
      <g transform="translate(0,350)"><text x="-150" y="15" class="data-label">Neuroscience</text><rect width="60" height="18" fill="#ffd84a"/><text x="70" y="15" class="data-value">10/100</text></g>
      <g transform="translate(0,385)"><text x="-150" y="15" class="data-label">Cross-Domain</text><rect width="90" height="18" fill="#ff9a3c"/><text x="100" y="15" class="data-value">13/100</text></g>
      <g transform="translate(0,420)"><text x="-150" y="15" class="data-label">Morphic Logic</text><rect width="110" height="18" fill="#ff6cb3"/><text x="120" y="15" class="data-value">17/100</text></g>
